name: Build and Release APK

on:
  push:
    branches: [main]
  release:
    types: [created]

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout
      uses: actions/checkout@v4
    
    - name: Setup Java
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '17'
    
    - name: Setup Android SDK
      uses: android-actions/setup-android@v3
    
    - name: Cache Gradle packages
      uses: actions/cache@v4
      with:
        path: ~/.gradle/caches
        key: ${{ runner.os }}-gradle-${{ hashFiles('android/HorizonLoop/*.gradle*') }}
        restore-keys: ${{ runner.os }}-gradle-
    
    - name: Grant execute permission for gradlew
      run: chmod +x android/HorizonLoop/gradlew
    
    - name: Build debug APK
      run: android/HorizonLoop/gradlew -p android/HorizonLoop assembleDebug
    
    - name: Upload APK to Release
      if: github.event_name == 'release'
      uses: softprops/action-gh-release@v1
      with:
        files: android/HorizonLoop/app/build/outputs/apk/debug/app-debug.apk
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    
    - name: Upload APK as Artifact
      if: github.event_name != 'release'
      uses: actions/upload-artifact@v4
      with:
        name: app-debug-apk
        path: android/HorizonLoop/app/build/outputs/apk/debug/app-debug.apk